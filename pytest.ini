[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
filterwarnings =
    ignore::pytest.PytestUnhandledThreadExceptionWarning
markers =
    security: tests related to security fixes
    error_handling: tests related to error handling
    unit: unit tests
    integration: integration tests
    state_brain: state and brain persistence round-trips
    workflow: workflow ↔ brain ↔ state integration
    learning: learning engine + state integration
    persona: persona loader chain integration
    config: config from environment variables
    e2e: cross-module end-to-end flows
    scheduler: scheduler loop and retry decorator
    learning_loop: validates the actual learning feedback loop